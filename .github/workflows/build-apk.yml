name: 🏗️ Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ──────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. إعداد Java 17 ──────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. إعداد Node.js ──────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # تم حذف cache: 'npm' لأنه يتطلب package-lock.json

      # ── 4. تثبيت Capacitor ────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm install

      # ── 5. إضافة منصة Android ─────────────────────────────────
      - name: 🤖 Add Android platform
        run: npx cap add android

      # ── 6. مزامنة الملفات مع Android ─────────────────────────
      - name: 🔄 Sync web app to Android
        run: npx cap sync android

      # ── 7. منح صلاحيات Gradle ────────────────────────────────
      - name: 🔑 Grant Gradle permissions
        run: chmod +x android/gradlew

      # ── 8. إعداد Android SDK ──────────────────────────────────
      - name: 🛠️ Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. بناء APK ───────────────────────────────────────────
      - name: 🔨 Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 10. الحصول على اسم الملف ──────────────────────────────
      - name: 📍 Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found at: $APK_PATH"

      # ── 11. رفع APK كـ Artifact ───────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikroTik-Admin-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # ── 12. إنشاء GitHub Release تلقائياً ────────────────────
      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}-build${{ github.run_number }}
          name: "📱 MikroTik-Admin v${{ github.event.inputs.version || '1.0.0' }} (Build ${{ github.run_number }})"
          body: |
            ## 📱 تطبيق MikroTik-Admin للأندرويد

            ### ما الجديد في هذا الإصدار:
            - بناء تلقائي من آخر كود على الـ main branch
            - تاريخ البناء: ${{ github.event.repository.updated_at }}

            ### طريقة التثبيت:
            1. حمّل ملف `MikroTik-Admin.apk` أدناه
            2. على جهاز الأندرويد: الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبّته
            4. شغّل التطبيق وأدخل بيانات الراوتر

            ### ⚠️ ملاحظة مهمة:
            يجب أن يكون الـ Backend (PHP) يعمل على سيرفر على نفس الشبكة للتوصل بالميكروتيك.
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
